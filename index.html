<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Aflah</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background:#0b0b0b;
  color:#eaeaea;
  font-family: "Helvetica Neue", Arial, sans-serif;
  height:100vh;
  overflow:hidden;
}

/* Layout */
.container {
  display:flex;
  height:100vh;
}

/* Left Image Section */
.hero {
  flex:1;
  background:url('profile.jpg') center/cover no-repeat;
}

/* Right Content Section */
.content {
  width:420px;
  padding:80px 50px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  background:#0b0b0b;
}

h1 {
  font-size:40px;
  font-weight:500;
  letter-spacing:2px;
  margin-bottom:10px;
}

.tag {
  opacity:.5;
  margin-bottom:50px;
}

/* Navigation */
nav a {
  display:block;
  color:#eaeaea;
  text-decoration:none;
  margin:12px 0;
  font-size:15px;
  letter-spacing:1px;
  opacity:.7;
  transition:.25s;
}

nav a:hover {
  opacity:1;
  transform:translateX(6px);
}
</style>
</head>

<body>

<div class="container">

  <div class="hero"></div>

  <div class="content">
    <h1>AFLAH</h1>
    <div class="tag">Projects · Experiments · Writing</div>

    <nav>
      <a href="https://foryou.aflah.online">ForYou</a>
      <a href="https://cyberweb.aflah.online">CyberWeb</a>
      <a href="https://school.aflah.online">School System</a>
      <a href="https://vpnweb.aflah.online">VPN Tool</a>
      <a href="https://blog.aflah.online">Blog</a>
    </nav>
  </div>

</div>

</body>
</html>
